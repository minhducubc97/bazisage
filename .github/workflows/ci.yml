name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-bazi-core:
    name: bazi-core golden tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run bazi-core tests
        run: npm test
        working-directory: packages/bazi-core

  check-types:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check bazi-core
        run: npx tsc --noEmit
        working-directory: packages/bazi-core
